name: Test & Lint CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff mypy pytest-cov

    - name: Format check (black)
      run: black --check backend/ tests/

    - name: Lint (ruff)
      run: ruff check backend/ tests/

    - name: Type check (mypy)
      run: mypy backend/analytics/asset_classes.py backend/analytics/currency_risk.py backend/analytics/global_optimization.py --ignore-missing-imports

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --tb=short 2>&1 | head -100

    - name: Run integration tests (critical path)
      run: |
        python -m pytest tests/integration/test_asset_quality.py tests/integration/test_multi_asset.py -v --tb=short

    - name: Run all integration tests
      run: |
        python -m pytest tests/integration/ -v --tb=line 2>&1 | tail -30

    - name: Generate coverage report
      run: |
        python -m pytest tests/integration/test_asset_quality.py tests/integration/test_multi_asset.py --cov=backend.analytics --cov-report=term-missing

    - name: Verify API loads
      run: |
        python -c "from backend.api.main import app; print(f'✓ API loads successfully with {len(app.routes)} routes')"
