[pytest]
# Pytest configuration for crypto-daytrading Phase 1

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    --cov=backend
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=75
    --cov-branch

# Markers
markers =
    unit: Fast unit tests (<10ms, no I/O)
    integration: Integration tests (real Binance testnet, <30s)
    acceptance: Acceptance tests (paper trading runs, 10+ days)
    slow: Slow tests (skip with -m "not slow")

# Ignore patterns
norecursedirs = .git .venv venv htmlcov dist build *.egg

# Logging
log_cli = false
log_level = INFO

# Verbosity
addopts = -ra
